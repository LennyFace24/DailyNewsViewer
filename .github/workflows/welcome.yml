name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Welcome new issue contributors
        if: github.event_name == 'issues'
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 欢迎来到 DailyTech！感谢你的第一个 Issue！

            我们会尽快查看你的问题。在等待期间，请确保：
            - 详细描述了问题
            - 提供了复现步骤
            - 包含了相关截图（如适用）

            再次感谢你的贡献！🎉
          pr-message: |
            👋 欢迎来到 DailyTech！感谢你的第一个 PR！

            我们会尽快审查你的代码。在等待期间，请确保：
            - PR 描述清晰
            - 代码已自我审查
            - 测试通过

            再次感谢你的贡献！🎉
