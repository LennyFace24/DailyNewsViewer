name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            感谢你的第一个 Issue！🎉
            我们会尽快查看并回复。
          pr-message: |
            感谢你的第一个 Pull Request！🎉
            我们会尽快审查。
