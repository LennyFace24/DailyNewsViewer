# Bug 报告
bug:
  - '(?i)bug|fix|修复|错误|问题'

# 功能请求
enhancement:
  - '(?i)feature|feat|功能|增强|改进'

# 文档
documentation:
  - '(?i)doc|文档|readme|说明'

# 依赖更新
dependencies:
  - '(?i)dep|依赖|升级|更新'

# UI/UX
ui:
  - '(?i)ui|ux|界面|样式|css|design'

# 性能
performance:
  - '(?i)perf|performance|性能|优化'

# 测试
test:
  - '(?i)test|测试|spec'

# 构建
build:
  - '(?i)build|ci|构建|workflow|action'

# 重构
refactor:
  - '(?i)refactor|重构|重写'

# 新功能
feature:
  - '(?i)feature|feat|新功能|添加'
